<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>YouTube 구역 캡처</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- 상단 헤더 -->
        <header class="header">
            <h1>🎥 YouTube 구역 캡처</h1>
        </header>

        <!-- URL 입력 영역 -->
        <section class="url-section">
            <div class="url-row">
                <input
                    type="text"
                    id="youtubeUrl"
                    placeholder="유튜브 URL 붙여넣기..."
                    autocomplete="off"
                >
                <button id="loadBtn" class="btn btn-primary">▶ 불러오기</button>
            </div>
        </section>

        <!-- 메인 영역 -->
        <div class="main-layout">
            <!-- 영상 + 선택 오버레이 -->
            <div class="video-section">
                <div id="videoWrapper" class="video-wrapper">
                    <div id="placeholder" class="placeholder">
                        <div class="placeholder-icon">🎬</div>
                        <p>유튜브 URL을 입력하고 불러오기를 누르세요</p>
                    </div>
                    <!-- YouTube iframe (데스크탑용) -->
                    <iframe
                        id="ytPlayer"
                        style="display:none"
                        frameborder="0"
                        allow="autoplay; encrypted-media"
                        allowfullscreen
                    ></iframe>

                    <!-- 직접 비디오 (iOS/모바일용) -->
                    <video
                        id="directVideoEl"
                        style="display:none;width:100%;height:100%;object-fit:contain"
                        controls
                        playsinline
                        crossorigin="anonymous"
                    ></video>

                    <!-- 드래그 선택 오버레이 (화면캡처 모드에서 사용) -->
                    <canvas id="overlayCanvas" class="overlay-canvas"></canvas>
                </div>

                <!-- 화면 캡처 미리보기 (숨김) -->
                <video id="screenVideo" autoplay muted style="display:none"></video>
                <!-- 캡처 작업용 캔버스 (숨김) -->
                <canvas id="workCanvas" style="display:none"></canvas>

                <!-- 컨트롤 바 -->
                <div class="control-bar">
                    <button id="screenCaptureBtn" class="btn btn-blue" disabled>
                        🖥️ 화면 공유 시작
                    </button>
                    <button id="selectRegionBtn" class="btn btn-orange" disabled>
                        ✂️ 구역 선택
                    </button>
                    <button id="manualCaptureBtn" class="btn btn-green" disabled>
                        📸 지금 캡처
                    </button>
                </div>
                <div class="control-bar">
                    <label class="toggle-label">
                        <input type="checkbox" id="autoCapture">
                        자동 캡처 (변화 감지)
                    </label>
                    <label class="small-label">간격
                        <input type="number" id="checkInterval" value="1.5" min="0.5" max="10" step="0.5" class="small-input">초
                    </label>
                    <label class="small-label">민감도
                        <input type="range" id="sensitivity" min="1" max="20" value="5" class="range-input">
                    </label>
                </div>
                <div id="statusBar" class="status-bar">영상을 불러오고 화면 공유를 시작하세요</div>

                <!-- 로그 패널 -->
                <div class="log-panel">
                    <div class="log-header">
                        <span>🪵 로그</span>
                        <div style="display:flex;gap:6px;align-items:center">
                            <label class="toggle-label" style="font-size:0.75rem">
                                <input type="checkbox" id="logToggle" checked> 표시
                            </label>
                            <button id="clearLogBtn" class="btn btn-gray btn-sm">지우기</button>
                        </div>
                    </div>
                    <div id="logOutput" class="log-output"></div>
                </div>
            </div>

            <!-- 오른쪽: 캡처 목록 -->
            <aside class="captures-panel">
                <div class="panel-header">
                    <span>캡처 목록 (<span id="captureCount">0</span>개)</span>
                    <div>
                        <button id="exportPdfBtn" class="btn btn-red btn-sm" disabled>📄 PDF</button>
                        <button id="clearBtn" class="btn btn-gray btn-sm">🗑️ 삭제</button>
                    </div>
                </div>
                <div id="captureList" class="capture-list">
                    <p class="empty-hint">캡처된 이미지가 없습니다</p>
                </div>
            </aside>
        </div>
    </div>

    <!-- 구역 선택 모달 오버레이 -->
    <div id="regionModal" class="region-modal" style="display:none">
        <canvas id="regionCanvas" class="region-canvas"></canvas>
        <div class="region-hint">드래그하여 캡처할 구역을 선택하세요 (ESC: 취소)</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
